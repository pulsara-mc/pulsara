name: Pulsara-MC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Verify
        run: go mod verify

      - name: Build
        run: go build -v ./cmd/...

      - name: Test
        run: go test -race -v ./...
